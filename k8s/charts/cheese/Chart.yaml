apiVersion: v2
name: cheese
description: |
  Single Helm chart for the CHEESE on-prem stack. One `helm install` brings up
  the whole thing; every component is toggled with a top-level `.enabled` key.

  Core:     cheese-database (search engine — app / jobs-db / jobs-exec /
            download-exec / file-server roles off one image),
            cheese-orchestrator (the API the UI calls),
            cheese-search-ui (public frontend).
  Optional: cheese-synthongpt, ketcher (self-hosted molecule editor),
            inference (electrostatics), alignment (conformer alignment),
            supabase (in-cluster auth + per-user spaces), oauth2-proxy (SSO stub).

  Environment is selected with `deployment.target` (local | aws); azure is
  deprecated. Secrets support an `existingSecret` per component for external
  secret management, with an inline fallback for self-contained installs.
type: application
version: 0.3.0
appVersion: "0.0.1"
