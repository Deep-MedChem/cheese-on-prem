# Supabase gateway — one public origin for the browser + orchestrator.
# Rendered to ~/.config/cheese/supabase/gateway.conf by `cheese setup-supabase`.
#
# supabase-js calls /auth/v1/* and /rest/v1/*; GoTrue and PostgREST each serve at
# their own root, so the trailing slash on proxy_pass strips the matched prefix.
# Studio is served at / and protected by HTTP basic auth (DASHBOARD_USERNAME/PASSWORD).

server {
    listen 8000;
    server_name _;

    # Large headers: Supabase JWTs + apikey can be sizable.
    large_client_header_buffers 4 32k;

    # GoTrue (auth): /auth/v1/signup, /auth/v1/token, /auth/v1/user, /auth/v1/keys, ...
    location /auth/v1/ {
        proxy_pass http://supabase-auth:9999/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # PostgREST (data): /rest/v1/<table>. PostgREST validates the JWT and applies
    # RLS, so per-user isolation is enforced here regardless of the gateway.
    location /rest/v1/ {
        proxy_pass http://supabase-rest:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Studio admin dashboard (behind basic auth). Admins inspect/manage users here.
    location / {
        auth_basic "CHEESE Supabase admin";
        auth_basic_user_file /etc/nginx/.htpasswd;
        proxy_pass http://supabase-studio:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
