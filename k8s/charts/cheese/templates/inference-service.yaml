{{- if .Values.inference.enabled -}}
{{- /* Service name MUST be cheese-inference — the UI server's default
       ELECTROSTATICS_API host. */ -}}
apiVersion: v1
kind: Service
metadata:
  name: cheese-inference
  labels:
    {{- include "cheese.componentLabels" (list . "inference") | nindent 4 }}
spec:
  type: {{ .Values.inference.service.type }}
  ports:
    - port: {{ .Values.inference.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "cheese.componentSelectorLabels" (list . "inference") | nindent 4 }}
{{- end }}
