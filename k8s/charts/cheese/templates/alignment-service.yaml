{{- if .Values.alignment.enabled -}}
{{- /* Service name MUST be cheese-alignment-app — the UI server's ALIGNMENT_API host. */ -}}
apiVersion: v1
kind: Service
metadata:
  name: cheese-alignment-app
  labels:
    {{- include "cheese.componentLabels" (list . "alignment") | nindent 4 }}
spec:
  type: {{ .Values.alignment.service.type }}
  ports:
    - port: {{ .Values.alignment.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "cheese.componentSelectorLabels" (list . "alignment") | nindent 4 }}
{{- end }}
