{{- if .Values.synthongpt.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: cheese-synthongpt
  labels:
    {{- include "cheese.componentLabels" (list . "synthongpt") | nindent 4 }}
spec:
  type: {{ .Values.synthongpt.service.type }}
  ports:
    - port: {{ .Values.synthongpt.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "cheese.componentSelectorLabels" (list . "synthongpt") | nindent 4 }}
{{- end }}