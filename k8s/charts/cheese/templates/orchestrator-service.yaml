{{- if .Values.orchestrator.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: cheese-orchestrator
  labels:
    {{- include "cheese.componentLabels" (list . "orchestrator") | nindent 4 }}
spec:
  type: {{ .Values.orchestrator.service.type }}
  ports:
    - port: {{ .Values.orchestrator.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "cheese.componentSelectorLabels" (list . "orchestrator") | nindent 4 }}
{{- end }}