{{- if .Values.searchUi.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: cheese-search-ui
  labels:
    {{- include "cheese.componentLabels" (list . "search-ui") | nindent 4 }}
spec:
  type: {{ .Values.searchUi.service.type }}
  ports:
    - port: {{ .Values.searchUi.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "cheese.componentSelectorLabels" (list . "search-ui") | nindent 4 }}
{{- end }}
