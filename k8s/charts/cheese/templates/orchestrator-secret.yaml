{{- if and .Values.orchestrator.enabled (not .Values.orchestrator.secret.existingSecret) -}}
apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: cheese-orchestrator
  labels:
    {{- include "cheese.componentLabels" (list . "orchestrator") | nindent 4 }}
stringData:
  supabaseServiceRoleKey: {{ .Values.orchestrator.supabase.serviceRoleKey | quote }}
  discordWebhookUrl: {{ .Values.orchestrator.secret.discordWebhookUrl | quote }}
{{- end }}