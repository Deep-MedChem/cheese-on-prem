{{- if .Values.ketcher.enabled -}}
{{- $root := . -}}
{{- $k := .Values.ketcher -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cheese-ketcher
  labels:
    {{- include "cheese.componentLabels" (list $root "ketcher") | nindent 4 }}
spec:
  replicas: {{ $k.replicaCount }}
  selector:
    matchLabels:
      {{- include "cheese.componentSelectorLabels" (list $root "ketcher") | nindent 6 }}
  template:
    metadata:
      {{- with $k.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "cheese.componentSelectorLabels" (list $root "ketcher") | nindent 8 }}
    spec:
      {{- include "cheese.imagePullSecrets" $k.image | nindent 6 }}
      securityContext:
        {{- toYaml $k.podSecurityContext | nindent 8 }}
      containers:
        - name: ketcher
          securityContext:
            {{- toYaml $k.securityContext | nindent 12 }}
          image: {{ include "cheese.image" $k.image | quote }}
          imagePullPolicy: {{ include "cheese.imagePullPolicy" $k.image }}
          ports:
            - name: http
              containerPort: {{ $k.containerPort }}
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            {{- toYaml $k.resources | nindent 12 }}
      {{- with $k.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $k.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      affinity:
      {{- if $k.affinity }}
        {{- $k.affinity | toYaml | nindent 8 }}
      {{- else }}
        {{- include "cheese.affinityPreset" (list $root "ketcher" $k) | nindent 8 }}
      {{- end }}
{{- end }}
