{{- if .Values.supabase.enabled -}}
{{- $s := .Values.supabase -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: supabase-gateway
  labels:
    {{- include "cheese.componentLabels" (list . "supabase-gateway") | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "cheese.componentSelectorLabels" (list . "supabase-gateway") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "cheese.componentSelectorLabels" (list . "supabase-gateway") | nindent 8 }}
    spec:
      securityContext:
        {{- toYaml $s.securityContext | nindent 8 }}
      volumes:
        - name: conf
          configMap:
            name: cheese-supabase-gateway
      containers:
        - name: gateway
          image: "{{ $s.images.gateway.repository }}:{{ $s.images.gateway.tag }}"
          imagePullPolicy: {{ $s.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ $s.gateway.port }}
              protocol: TCP
          volumeMounts:
            - name: conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
            - name: conf
              mountPath: /etc/nginx/.htpasswd
              subPath: htpasswd
              readOnly: true
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml $s.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: supabase-gateway
  labels:
    {{- include "cheese.componentLabels" (list . "supabase-gateway") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ $s.gateway.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "cheese.componentSelectorLabels" (list . "supabase-gateway") | nindent 4 }}
{{- end }}
