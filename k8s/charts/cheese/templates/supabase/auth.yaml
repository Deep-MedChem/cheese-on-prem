{{- if .Values.supabase.enabled -}}
{{- $s := .Values.supabase -}}
{{- $sec := include "cheese.supabaseSecretName" . -}}
{{- $pub := include "cheese.supabasePublicUrl" . -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: supabase-auth
  labels:
    {{- include "cheese.componentLabels" (list . "supabase-auth") | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "cheese.componentSelectorLabels" (list . "supabase-auth") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "cheese.componentSelectorLabels" (list . "supabase-auth") | nindent 8 }}
    spec:
      securityContext:
        {{- toYaml $s.securityContext | nindent 8 }}
      containers:
        - name: auth
          image: "{{ $s.images.auth.repository }}:{{ $s.images.auth.tag }}"
          imagePullPolicy: {{ $s.imagePullPolicy }}
          ports:
            - name: http
              containerPort: 9999
              protocol: TCP
          env:
            # PGPASS first so $(PGPASS) interpolation below resolves at container start.
            - name: PGPASS
              valueFrom:
                secretKeyRef:
                  name: {{ $sec }}
                  key: postgresPassword
            - name: GOTRUE_API_HOST
              value: "0.0.0.0"
            - name: GOTRUE_API_PORT
              value: "9999"
            - name: API_EXTERNAL_URL
              value: {{ $pub | quote }}
            - name: GOTRUE_DB_DRIVER
              value: postgres
            - name: GOTRUE_DB_DATABASE_URL
              value: "postgres://postgres:$(PGPASS)@supabase-db:5432/postgres"
            - name: GOTRUE_SITE_URL
              value: {{ $pub | quote }}
            - name: GOTRUE_URI_ALLOW_LIST
              value: "*"
            - name: GOTRUE_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ $sec }}
                  key: jwtSecret
            - name: GOTRUE_JWT_EXP
              value: {{ $s.jwtExpiry | quote }}
            - name: GOTRUE_JWT_AUD
              value: authenticated
            - name: GOTRUE_JWT_DEFAULT_GROUP_NAME
              value: authenticated
            - name: GOTRUE_JWT_ISSUER
              value: "{{ $pub }}/auth/v1"
            - name: GOTRUE_DISABLE_SIGNUP
              value: {{ $s.disableSignup | quote }}
            - name: GOTRUE_EXTERNAL_EMAIL_ENABLED
              value: "true"
            - name: GOTRUE_MAILER_AUTOCONFIRM
              value: {{ $s.mailerAutoconfirm | quote }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            {{- toYaml $s.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: supabase-auth
  labels:
    {{- include "cheese.componentLabels" (list . "supabase-auth") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 9999
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "cheese.componentSelectorLabels" (list . "supabase-auth") | nindent 4 }}
{{- end }}
