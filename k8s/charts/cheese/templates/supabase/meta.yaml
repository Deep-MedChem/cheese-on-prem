{{- if .Values.supabase.enabled -}}
{{- $s := .Values.supabase -}}
{{- $sec := include "cheese.supabaseSecretName" . -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: supabase-meta
  labels:
    {{- include "cheese.componentLabels" (list . "supabase-meta") | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "cheese.componentSelectorLabels" (list . "supabase-meta") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "cheese.componentSelectorLabels" (list . "supabase-meta") | nindent 8 }}
    spec:
      securityContext:
        {{- toYaml $s.securityContext | nindent 8 }}
      containers:
        - name: meta
          image: "{{ $s.images.meta.repository }}:{{ $s.images.meta.tag }}"
          imagePullPolicy: {{ $s.imagePullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: PG_META_PORT
              value: "8080"
            - name: PG_META_DB_HOST
              value: supabase-db
            - name: PG_META_DB_PORT
              value: "5432"
            - name: PG_META_DB_NAME
              value: postgres
            - name: PG_META_DB_USER
              value: postgres
            - name: PG_META_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $sec }}
                  key: postgresPassword
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml $s.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: supabase-meta
  labels:
    {{- include "cheese.componentLabels" (list . "supabase-meta") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "cheese.componentSelectorLabels" (list . "supabase-meta") | nindent 4 }}
{{- end }}
