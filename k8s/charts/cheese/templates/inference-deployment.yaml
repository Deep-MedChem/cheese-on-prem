{{- if .Values.inference.enabled -}}
{{- $root := . -}}
{{- $inf := .Values.inference -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cheese-inference
  labels:
    {{- include "cheese.componentLabels" (list $root "inference") | nindent 4 }}
spec:
  replicas: {{ $inf.replicaCount }}
  selector:
    matchLabels:
      {{- include "cheese.componentSelectorLabels" (list $root "inference") | nindent 6 }}
  template:
    metadata:
      {{- with $inf.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "cheese.componentSelectorLabels" (list $root "inference") | nindent 8 }}
    spec:
      {{- include "cheese.imagePullSecrets" $inf.image | nindent 6 }}
      securityContext:
        {{- toYaml $inf.podSecurityContext | nindent 8 }}
      containers:
        - name: inference
          securityContext:
            {{- toYaml $inf.securityContext | nindent 12 }}
          image: {{ include "cheese.image" $inf.image | quote }}
          imagePullPolicy: {{ include "cheese.imagePullPolicy" $inf.image }}
          ports:
            - name: http
              containerPort: {{ $inf.containerPort }}
              protocol: TCP
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            {{- toYaml $inf.resources | nindent 12 }}
      {{- with $inf.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $inf.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      affinity:
      {{- if $inf.affinity }}
        {{- $inf.affinity | toYaml | nindent 8 }}
      {{- else }}
        {{- include "cheese.affinityPreset" (list $root "inference" $inf) | nindent 8 }}
      {{- end }}
{{- end }}
