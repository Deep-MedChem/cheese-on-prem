{{- if and .Values.searchUi.enabled .Values.searchUi.ingress.enabled -}}
{{- $svcPort := .Values.searchUi.service.port -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cheese-search-ui
  labels:
    {{- include "cheese.componentLabels" (list . "search-ui") | nindent 4 }}
  {{- with .Values.searchUi.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.searchUi.ingress.className }}
  ingressClassName: {{ .Values.searchUi.ingress.className }}
  {{- end }}
  {{- if .Values.searchUi.ingress.tls }}
  tls:
    {{- range .Values.searchUi.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.searchUi.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType | default "Prefix" }}
            backend:
              service:
                name: cheese-search-ui
                port:
                  number: {{ $svcPort }}
          {{- end }}
    {{- end }}
{{- end }}
