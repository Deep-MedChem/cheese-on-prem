# Local kind PV example. Copy to persistent-volume.local.yaml and edit hostPath.
# Production clusters provision storage out-of-band; this file is for the kind sandbox.
apiVersion: v1
kind: PersistentVolume
metadata:
  name: cheese-data-pv
spec:
  capacity:
    storage: 10Ti
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: cheese-local-manual
  hostPath:
    path: /data
