# Only required when any chart sets image.source: acr.
# Generate the dockerconfigjson with:
#   kubectl create secret docker-registry cheese-acr-pull \
#     --namespace cheese \
#     --docker-server=cheese.azurecr.io \
#     --docker-username=<acr-user> \
#     --docker-password=<acr-token> \
#     --dry-run=client -o yaml > image-pull-secret.yaml
apiVersion: v1
kind: Secret
metadata:
  name: cheese-acr-pull
  namespace: cheese
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: REPLACE_WITH_BASE64_DOCKERCONFIGJSON
